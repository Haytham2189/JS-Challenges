<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Gallery</title>

  <style>

    #bigImage {
      width: 400px;
      display: block;
      margin-bottom: 20px;
    }

    .thumbnails img {
      width: 100px;
      cursor: pointer;
      margin-right: 10px;
    }

  </style>

</head>

<body>

  <img id="bigImage" src="test/image1.webp">

  <div class="thumbnails">

    <img class="thumb" src="test/image1.webp">

    <img class="thumb" src="test/image2.webp">

    <img class="thumb" src="test/image3.webp">

    <img class="thumb" src="test/image4.jpg"

  </div>

  <script src="41-image-gallery.js"></script>

</body>

</html>
