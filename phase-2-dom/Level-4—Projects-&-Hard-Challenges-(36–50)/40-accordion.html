<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accordion</title>

  <style>

    .accordion {
      width: 400px;
      margin-bottom: 10px;
      border: 1px solid black;
    }

    .title {
      padding: 15px;
      background-color: lightgray;
      cursor: pointer;
    }

    .content {
      padding: 15px;
      display: none;
    }

    .content.active {
      display: block;
    }

  </style>

</head>

<body>

  <div class="accordion">

    <div class="title">
      Section 1
    </div>

    <div class="content">
      Content of section 1
    </div>

  </div>

  <div class="accordion">

    <div class="title">
      Section 2
    </div>

    <div class="content">
      Content of section 2
    </div>

  </div>

  <div class="accordion">

    <div class="title">
      Section 3
    </div>

    <div class="content">
      Content of section 3
    </div>

  </div>

  <script src="40-accordion.js"></script>

</body>

</html>
