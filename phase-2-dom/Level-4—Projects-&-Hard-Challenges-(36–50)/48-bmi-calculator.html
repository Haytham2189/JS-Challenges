<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMI Calculator</title>

  <style>

    body {
      font-family: Arial;
    }

    input {
      display: block;
      margin-bottom: 10px;
    }

    #result {
      font-size: 22px;
      font-weight: bold;
    }

  </style>

</head>

<body>

  <input id="weight" type="number" placeholder="Weight (kg)">

  <input id="height" type="number" placeholder="Height (m)">

  <button id="btn">
    Calculate BMI
  </button>

  <p id="result"></p>

  <script src="48-bmi-calculator.js"></script>

</body>

</html>
