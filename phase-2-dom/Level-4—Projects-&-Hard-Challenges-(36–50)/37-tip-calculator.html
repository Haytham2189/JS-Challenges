<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tip Calculator</title>

  <style>
    body {
      font-family: Arial;
    }

    input {
      margin-bottom: 10px;
      display: block;

  </p>

  <script src="37-tip-calculator.js"></script>

</html>
