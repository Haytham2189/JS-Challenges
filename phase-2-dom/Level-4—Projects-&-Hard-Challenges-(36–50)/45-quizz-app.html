<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz App</title>

  <style>

    body {
      font-family: Arial;
    }

    .question {
      margin-bottom: 25px;
    }

  </style>

</head>

<body>

  <h1>Quiz App</h1>

  <div class="question">

    <p>1. What does HTML stand for?</p>

    <input type="radio" name="q1" value="a"> Hyper Text Markup Language<br>

    <input type="radio" name="q1" value="b"> Home Tool Markup Language

  </div>

  <div class="question">

    <p>2. Which language is used for styling?</p>

    <input type="radio" name="q2" value="a"> CSS<br>

    <input type="radio" name="q2" value="b"> Python

  </div>

  <div class="question">

    <p>3. Which keyword creates a variable?</p>

    <input type="radio" name="q3" value="a"> let<br>

    <input type="radio" name="q3" value="b"> style

  </div>

  <div class="question">

    <p>4. Which method selects by id?</p>

    <input type="radio" name="q4" value="a"> getElementById<br>

    <input type="radio" name="q4" value="b"> queryStyle

  </div>

  <div class="question">

    <p>5. Which event detects a click?</p>

    <input type="radio" name="q5" value="a"> click<br>

    <input type="radio" name="q5" value="b"> hover

  </div>

  <button id="submitBtn">
    Submit Quiz
  </button>

  <p id="result"></p>

  <script src="45-quizz-app.js"></script>

</body>

</html>
