<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Light Dark Mode</title>

  <style>

    body {
      background-color: white;
      color: black;
      transition: 0.3s;
    }

    .dark {
      background-color: black;
      color: white;
    }

  </style>

</head>

<body>

  <h1>
    Light / Dark Mode
  </h1>

  <button id="btn">
    Toggle Mode
  </button>

  <script src="36-light-dark-mode.js"></script>

</body>

</html>
