<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Progress Bar</title>

  <style>

    #container {
      width: 400px;
      height: 30px;
      border: 2px solid black;
    }

    #progress {
      width: 0%;
      height: 100%;
      background-color: green;
    }

  </style>

</head>

<body>

  <div id="container">

    <div id="progress"></div>

  </div>

  <button id="btn">
    Increase Progress
  </button>

  <script src="35-progress-bar.js"></script>

</body>

</html>
