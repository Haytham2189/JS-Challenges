<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toggle Class</title>

  <style>
  #box {
  width: 200px;
  height: 200px;
  background-color: gray;
}

#box.active {
  background-color: rgb(128, 0, 0);
  border-radius: 20px;
}
  </style>
</head>

<body>

  <div id="box"></div>

  <button id="btn">
    Toggle Active
  </button>

  <script src="25-change-class.js"></script>

</body>

</html>
